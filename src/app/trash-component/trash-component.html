<div class="trash-page">

  <div class="page-topbar">
    <button class="back-btn" routerLink="/notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <button
      class="empty-trash-btn"
      *ngIf="(trashNotes$ | async)?.length"
      (click)="onEmptyTrash()">
      Empty trash
    </button>
  </div>

  <div class="page-header">
    <h1 class="page-title">🗑️ Trash</h1>
    <p class="page-sub">Notes are permanently deleted after 30 days.</p>
  </div>

  <div class="trash-list" *ngIf="(trashNotes$ | async)?.length; else emptyTrash">
    <div class="trash-item" *ngFor="let note of trashNotes$ | async">

      <div class="trash-item-icon">📄</div>

      <div class="trash-item-body">
        <span class="trash-item-title">{{ note.title || 'Untitled' }}</span>
        <span class="trash-item-meta">Deleted {{ note.deletedAt | timeAgo }}</span>
      </div>

      <div class="trash-item-actions">
        <button class="action-btn restore" (click)="onRestore(note.id)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.4"/></svg>
          Restore
        </button>
        <button class="action-btn delete" (click)="onPermanentDelete(note.id)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Delete
        </button>
      </div>

    </div>
  </div>

  <ng-template #emptyTrash>
    <div class="empty-state">
      <div class="empty-icon">🗑️</div>
      <p class="empty-title">Trash is empty</p>
      <p class="empty-sub">Notes you delete will appear here for 30 days.</p>
    </div>
  </ng-template>

</div>
