<!-- GRID VIEW -->
<div *ngIf="displayMode === 'grid'"
  class="note-card grid-card"
  (click)="onOpen()"
  [style.background]="cardColor !== 'transparent' ? cardColor + '22' : ''"
  [style.border-color]="cardColor !== 'transparent' ? cardColor + '55' : ''">

  <div class="card-color-bar" *ngIf="cardColor !== 'transparent'" [style.background]="cardColor"></div>

  <div class="card-body">
    <div class="card-title-row">
      <span class="card-title" [innerHTML]="(note.title || 'Untitled') | highlight:searchTerm"></span>
      <span class="pin-badge" *ngIf="note.isPinned" title="Pinned">📌</span>
    </div>
    <p class="card-preview" [innerHTML]="(note.content | truncate:120) | highlight:searchTerm"></p>
  </div>

  <div class="card-footer">
    <span class="card-time">{{ note.updatedAt | timeAgo }}</span>
  </div>
</div>

<!-- LIST VIEW -->
<div *ngIf="displayMode === 'list'"
  class="note-card list-card"
  (click)="onOpen()">

  <div class="list-color-dot" *ngIf="cardColor !== 'transparent'" [style.background]="cardColor"></div>
  <div class="list-emoji" *ngIf="cardColor === 'transparent'">📄</div>

  <div class="list-body">
    <span class="list-title" [innerHTML]="(note.title || 'Untitled') | highlight:searchTerm"></span>
    <span class="list-preview" [innerHTML]="(note.content | truncate:60) | highlight:searchTerm"></span>
  </div>

  <div class="list-meta">
    <span class="pin-badge" *ngIf="note.isPinned">📌</span>
    <span class="card-time">{{ note.updatedAt | timeAgo }}</span>
  </div>
</div>
