<div class="note-list-page">

  <!-- Top bar -->
  <div class="page-topbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        class="search-input"
        #searchInput
        type="text"
        placeholder="Search notes…"
        (input)="onSearch($event)">
      <button class="search-clear" *ngIf="searchInput.value" (click)="clearSearch(searchInput)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="topbar-actions">
      <button class="view-toggle" (click)="toggleView()" [title]="isGridView ? 'List view' : 'Grid view'">
        <svg *ngIf="isGridView" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <svg *ngIf="!isGridView" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="new-note-btn" (click)="createNewNote()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New
      </button>
    </div>
  </div>

  <!-- Page title -->
  <div class="page-header">
    <h1 class="page-title">{{ pageTitle }}</h1>
  </div>

  <!-- Notes grid/list -->
  <div class="notes-container" *ngIf="notes.length > 0; else emptyState">

    <!-- Pinned section -->
    <div *ngIf="pinnedNotes.length > 0">
      <div class="notes-section-label">📌 Pinned</div>
      <div [class]="isGridView ? 'notes-grid' : 'notes-list'">
        <app-note-card
          *ngFor="let note of pinnedNotes"
          [note]="note"
          [displayMode]="isGridView ? 'grid' : 'list'"
          [searchTerm]="currentSearchTerm">
        </app-note-card>
      </div>
    </div>

    <!-- Other notes -->
    <div *ngIf="unpinnedNotes.length > 0">
      <div class="notes-section-label" *ngIf="pinnedNotes.length > 0">Other</div>
      <div [class]="isGridView ? 'notes-grid' : 'notes-list'">
        <app-note-card
          *ngFor="let note of unpinnedNotes"
          [note]="note"
          [displayMode]="isGridView ? 'grid' : 'list'"
          [searchTerm]="currentSearchTerm">
        </app-note-card>
      </div>
    </div>

  </div>

  <!-- Empty state -->
  <ng-template #emptyState>
    <div class="empty-state">
      <div class="empty-icon">📄</div>
      <p class="empty-title">No pages here</p>
      <p class="empty-sub">Create a new note to get started.</p>
      <button class="empty-cta" (click)="createNewNote()">+ New page</button>
    </div>
  </ng-template>

</div>
