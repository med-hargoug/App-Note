<div class="app-root">
  <!-- Sidebar with animated collapse -->
  <div class="sidebar-wrapper" [class.collapsed]="!sidebarOpen">
    <app-folder-side-bar></app-folder-side-bar>
  </div>

  <main class="main-content">
    <!-- Sidebar toggle button — always visible -->
    <button class="sidebar-toggle-btn" (click)="toggleSidebar()" [title]="sidebarOpen ? 'Hide sidebar' : 'Show sidebar'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
    <router-outlet></router-outlet>
  </main>
</div>
