<!-- GRID MODE -->
<div class="note-card grid-card" *ngIf="displayMode === 'grid'" (click)="onOpen()">
  <div class="card-header" 
  [style.background]="getHeaderGradient(note)"
  [style.background-size]="'cover'"
  [style.background-position]="'center'">
    <span class="card-emoji">📝</span>
    <span class="card-pin" *ngIf="note.isPinned">📌</span>
  </div>
  <div class="card-body">
    <!-- [innerHTML] renders the highlight <mark> tags safely via DomSanitizer -->
    <p class="card-title" [class.untitled]="!note.title" [innerHTML]="safeTitle"></p>
    <p class="card-preview" [class.empty]="!getPlainText(note.content)" [innerHTML]="safePreview"></p>
  </div>
  <div class="card-footer">
    <span class="card-date">{{ note.updatedAt | timeAgo }}</span>
  </div>
</div>

<!-- LIST MODE -->
<div class="note-card list-card" *ngIf="displayMode === 'list'" (click)="onOpen()">
  <span class="list-emoji">📝</span>
  <span class="list-title" [class.untitled]="!note.title" [innerHTML]="safeTitle"></span>
  <span class="list-preview" [innerHTML]="safePreview"></span>
  <span class="list-date">{{ note.updatedAt | timeAgo }}</span>
  <span class="list-pin" *ngIf="note.isPinned">📌</span>
</div>
