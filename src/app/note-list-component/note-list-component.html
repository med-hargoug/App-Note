<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>My Notes</h2>
  <button (click)="toggleView()" class="btn btn-outline-secondary">
    <i class="bi" [ngClass]="isGridView ? 'bi-list-ul' : 'bi-grid-3x3-gap'"></i>
    {{ isGridView ? ' Switch to List' : ' Switch to Grid' }}
  </button>
</div>

<div class="row g-3" [ngClass]="isGridView ? 'row-cols-1 row-cols-md-3' : 'row-cols-1'">
  <div class="col" *ngFor="let note of notes">
    <app-note-card [note]="note" [displayMode]="isGridView ? 'grid' : 'list'"></app-note-card>
  </div>
</div>
<div class="empty-state" *ngIf="notes.length === 0">
  <div class="icon">📝</div>
  <h3>No notes found</h3>
  <p>Click the "New Note" button in the sidebar to get started!</p>
</div>
<div class="container mt-5">
  <div *ngIf="notes.length === 0" class="text-center p-5 empty-container">
    <div class="display-1">📝</div>
    <h3 class="mt-3">Your workspace is empty</h3>
    <p class="text-muted">Start capturing your thoughts by creating your first note.</p>
    <button (click)="createNewNote()" class="btn btn-primary btn-lg mt-2">
      + Create New Note
    </button>
  </div>

  <div *ngIf="notes.length > 0" class="row g-4">
     <div class="col" *ngFor="let note of notes">
        <app-note-card [note]="note"></app-note-card>
     </div>
  </div>
</div>
<div class="list-container">
  <div *ngIf="notes.length === 0" class="empty-notifier">
    <div class="icon">📝</div>
    <h3>Your workspace is empty</h3>
    <p>Capture your thoughts by creating your first note.</p>
    <button (click)="createNewNote()" class="btn-create-big">
      + Create New Note
    </button>
  </div>

  <div *ngIf="notes.length > 0" class="notes-grid">
     <div *ngFor="let note of notes">
        <app-note-card [note]="note"></app-note-card>
     </div>
  </div>
</div>
