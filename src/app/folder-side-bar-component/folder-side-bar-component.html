<aside class="sidebar">

  <!-- Workspace header -->
  <div class="workspace-header">
    <div class="workspace-icon">N</div>
    <span class="workspace-name">My Workspace</span>
    <button class="icon-btn" (click)="toggleDarkMode()" title="Toggle dark mode">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>

  <!-- New note button -->
  <button class="new-page-btn" (click)="addNewNote()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    New page
  </button>

  <!-- Static nav items -->
  <nav class="nav-section">
    <div class="nav-item" [class.active]="activeFilter === 'all'" (click)="selectFilter('all')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      All Notes
    </div>
  </nav>

  <!-- Folders section -->
  <div class="section-header">
    <span class="section-label">Folders</span>
    <button class="icon-btn" (click)="startAddFolder()" title="Add folder">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- Add folder input -->
  <div class="folder-input-wrap" *ngIf="isAddingFolder">
    <input
      class="folder-input"
      [(ngModel)]="newFolderName"
      placeholder="Folder name..."
      (keyup.enter)="confirmAddFolder()"
      (keyup.escape)="cancelAddFolder()"
      autofocus>
  </div>

  <!-- Folder list -->
  <nav class="nav-section folders-list">
    <div
      class="nav-item folder-item"
      *ngFor="let folder of folders"
      [class.active]="activeFilter === folder.id"
      (click)="selectFilter(folder.id)">

      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>

      <span class="folder-name" *ngIf="editingFolderId !== folder.id">{{ folder.name }}</span>
      <input
        class="folder-rename-input"
        *ngIf="editingFolderId === folder.id"
        [(ngModel)]="editingFolderName"
        (keyup.enter)="confirmEditFolder(folder.id)"
        (keyup.escape)="editingFolderId = null"
        (click)="$event.stopPropagation()">

      <div class="folder-actions" *ngIf="editingFolderId !== folder.id">
        <button class="icon-btn tiny" (click)="startEditFolder(folder, $event)" title="Rename">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn tiny danger" (click)="deleteFolder(folder.id, $event)" title="Delete">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Bottom: Trash -->
  <div class="sidebar-bottom">
    <div class="nav-item" [class.active]="activeFilter === 'trash'" (click)="selectFilter('trash')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 3h6"/></svg>
      Trash
    </div>
  </div>

</aside>
